apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice-deployment
  namespace: boutique
  labels:
    app: productcatalogservice 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productcatalogservice 
  template:
    metadata:
      labels:
        app: productcatalogservice 
  spec:
    containers:
    - name: productcatalogservicecontainer
      image: pavankumarkothala31/productcatalogservice:v1
      ports:
        - containerPort: 3550
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

      readinessProbe:
        initialDelaySeconds: 10
        periodSeconds: 10
        grpc:
          port: 3550
      livenessProbe:
        initialDelaySeconds: 10
        periodSeconds: 10
        grpc:
          port: 3550
      env:
      - name: PORT
        value: "3550"
      - name: DISABLE_PROFILER
        value: "1"
       

---
apiVersion: v1
kind: Service
metadata:
  name: productcatalogservice 
  namespace: boutique
spec:
  type: ClusterIP
  selector:
    app: productcatalogservice 
  ports:
  - name: grpc
    port: 3550
    targetPort: 3550
