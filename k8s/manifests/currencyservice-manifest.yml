apiVersion: apps/v1
kind: Deployment
metadata:
  name: currencyservice-deployment
  namespace: boutique
  labels:
    app: currencyservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: currencyservice
  template:
    metadata:
      labels:
        app: currencyservice
    spec:
      containers:
      - name: currencyservicecontainer
        image: pavankumarkothala31/currencyservice:v1
        ports:
        - containerPort: 7000
        readinessProbe:
          grpc:
            port: 7000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          grpc:
            port: 7000
          initialDelaySeconds: 10
          periodSeconds: 10
        env:
        - name: PORT
          value: "7000"
        - name: DISABLE_PROFILER
          value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: currencyservice
  namespace: boutique
spec:
  selector:
    app: currencyservice
  ports:
  - port: 7000
    targetPort: 7000
